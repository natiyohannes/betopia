<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Registration - Betoch Ethiopian Property Platform</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script type="module" async src="https://static.rocket.new/rocket-web.js?_cfg=https%3A%2F%2Fbetocheth1225back.builtwithrocket.new&_be=https%3A%2F%2Fapplication.rocket.new&_v=0.1.10"></script>
  <script type="module" defer src="https://static.rocket.new/rocket-shot.js?v=0.0.1"></script>
  </head>
<body class="bg-surface min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-ethiopian">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex items-center">
                    <a href="property_search_and_browse.html" class="flex items-center space-x-2">
                        <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                            </svg>
                        </div>
                        <span class="text-xl font-bold text-text-primary">ቤቶች</span>
                    </a>
                </div>

                <!-- Language Toggle -->
                <div class="flex items-center space-x-4">
                    <div class="flex items-center bg-gray-100 rounded-lg p-1">
                        <button id="lang-en" class="px-3 py-1 text-sm font-medium text-text-primary bg-white rounded-md shadow-sm transition-all duration-200">
                            EN
                        </button>
                        <button id="lang-am" class="px-3 py-1 text-sm font-medium text-text-secondary transition-all duration-200">
                            አማ
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 py-8 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md mx-auto">
            <!-- Registration Form Container -->
            <div class="bg-white rounded-xl shadow-card p-8 border border-ethiopian">
                <!-- Form Header -->
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-text-primary mb-2">Create Account</h1>
                    <p class="text-text-secondary">Join Ethiopia's premier property marketplace</p>
                </div>

                <!-- Registration Form -->
                <form id="registrationForm" class="space-y-6">
                    <!-- Full Name -->
                    <div>
                        <label for="fullName" class="block text-sm font-medium text-text-primary mb-2">
                            Full Name
                        </label>
                        <input type="text" id="fullName" name="fullName" class="form-input" placeholder="Enter your full name" required />
                        <div id="fullNameError" class="text-error text-sm mt-1 hidden"></div>
                    </div>

                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-text-primary mb-2">
                            Email Address
                        </label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email address" required />
                        <div id="emailError" class="text-error text-sm mt-1 hidden"></div>
                    </div>

                    <!-- Phone Number -->
                    <div>
                        <label for="phone" class="block text-sm font-medium text-text-primary mb-2">
                            Phone Number
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <span class="text-text-secondary text-sm">+251</span>
                            </div>
                            <input type="tel" id="phone" name="phone" class="form-input pl-16" placeholder="9 12 34 56 78" pattern="[0-9]{9}" required />
                        </div>
                        <div id="phoneError" class="text-error text-sm mt-1 hidden"></div>
                    </div>

                    <!-- User Type Selection -->
                    <div>
                        <label class="block text-sm font-medium text-text-primary mb-3">
                            I am a
                        </label>
                        <div class="space-y-3">
                            <div class="flex items-center">
                                <input id="propertyOwner" name="userType" type="radio" value="owner" class="h-4 w-4 text-primary focus:ring-primary border-gray-300" required />
                                <label for="propertyOwner" class="ml-3 block text-sm text-text-primary">
                                    Property Owner
                                    <span class="block text-xs text-text-secondary">List and manage properties</span>
                                </label>
                            </div>
                            <div class="flex items-center">
                                <input id="propertySeeker" name="userType" type="radio" value="seeker" class="h-4 w-4 text-primary focus:ring-primary border-gray-300" required />
                                <label for="propertySeeker" class="ml-3 block text-sm text-text-primary">
                                    Property Seeker
                                    <span class="block text-xs text-text-secondary">Find and rent/buy properties</span>
                                </label>
                            </div>
                        </div>
                        <div id="userTypeError" class="text-error text-sm mt-1 hidden"></div>
                    </div>

                    <!-- Password -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-text-primary mb-2">
                            Password
                        </label>
                        <div class="relative">
                            <input type="password" id="password" name="password" class="form-input pr-10" placeholder="Create a strong password" minlength="8" required />
                            <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                <svg id="eyeIcon" class="h-5 w-5 text-text-secondary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </button>
                        </div>
                        <div id="passwordError" class="text-error text-sm mt-1 hidden"></div>
                        <div class="text-xs text-text-secondary mt-1">
                            Password must be at least 8 characters long
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div>
                        <label for="confirmPassword" class="block text-sm font-medium text-text-primary mb-2">
                            Confirm Password
                        </label>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" placeholder="Confirm your password" required />
                        <div id="confirmPasswordError" class="text-error text-sm mt-1 hidden"></div>
                    </div>

                    <!-- Terms and Conditions -->
                    <div class="flex items-start">
                        <input id="terms" name="terms" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded mt-1" required />
                        <label for="terms" class="ml-3 block text-sm text-text-primary">
                            I agree to the 
                            <a href="javascript:void(0)" class="text-primary hover:text-primary-600 underline">Terms and Conditions</a>
                            and 
                            <a href="javascript:void(0)" class="text-primary hover:text-primary-600 underline">Privacy Policy</a>
                            <span class="block text-xs text-text-secondary mt-1">
                                Including Telebirr payment processing terms and 50 ETB listing fees
                            </span>
                        </label>
                    </div>
                    <div id="termsError" class="text-error text-sm mt-1 hidden"></div>

                    <!-- Submit Button -->
                    <button type="submit" id="submitBtn" class="w-full btn-primary flex items-center justify-center space-x-2">
                        <span id="submitText">Create Account</span>
                        <div id="loadingSpinner" class="hidden">
                            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
                            </svg>
                        </div>
                    </button>
                </form>

                <!-- Social Registration -->
                <div class="mt-6">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-ethiopian"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-2 bg-white text-text-secondary">Or continue with</span>
                        </div>
                    </div>

                    <div class="mt-6 grid grid-cols-2 gap-3">
                        <button type="button" class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-lg shadow-sm bg-white text-sm font-medium text-text-primary hover:bg-gray-50 transition-all duration-200">
                            <svg class="w-5 h-5" viewBox="0 0 24 24">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            <span class="ml-2">Google</span>
                        </button>

                        <button type="button" class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-lg shadow-sm bg-white text-sm font-medium text-text-primary hover:bg-gray-50 transition-all duration-200">
                            <svg class="w-5 h-5" fill="#1877F2" viewBox="0 0 24 24">
                                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                            </svg>
                            <span class="ml-2">Facebook</span>
                        </button>
                    </div>
                </div>

                <!-- Login Link -->
                <div class="mt-6 text-center">
                    <p class="text-sm text-text-secondary">
                        Already have an account? 
                        <a href="user_login.html" class="text-primary hover:text-primary-600 font-medium transition-colors duration-200">
                            Login here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Background Image -->
    <div class="fixed inset-0 -z-10 opacity-5">
        <img src="https://images.unsplash.com/photo-1578662996442-48f60103fc96?q=80&w=2940&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Ethiopian Architecture" class="w-full h-full object-cover" loading="lazy" onerror="this.src='https://images.pexels.com/photos/1396122/pexels-photo-1396122.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2'; this.onerror=null;" />
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-success-100 mb-4">
                    <svg class="h-6 w-6 text-success" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <h3 class="text-lg font-medium text-text-primary mb-2">Account Created Successfully!</h3>
                <p class="text-sm text-text-secondary mb-6">Welcome to Betoch! You can now start exploring properties.</p>
                <button id="continueBtn" class="btn-primary w-full">
                    Continue to Dashboard
                </button>
            </div>
        </div>
    </div>

    <script>
        // Language Toggle
        const langEn = document.getElementById('lang-en');
        const langAm = document.getElementById('lang-am');
        
        langEn.addEventListener('click', () => {
            langEn.classList.add('bg-white', 'shadow-sm');
            langEn.classList.remove('text-text-secondary');
            langAm.classList.remove('bg-white', 'shadow-sm');
            langAm.classList.add('text-text-secondary');
        });
        
        langAm.addEventListener('click', () => {
            langAm.classList.add('bg-white', 'shadow-sm');
            langAm.classList.remove('text-text-secondary');
            langEn.classList.remove('bg-white', 'shadow-sm');
            langEn.classList.add('text-text-secondary');
        });

        // Password Toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            if (type === 'text') {
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21" />
                `;
            } else {
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                `;
            }
        });

        // Form Validation
        const form = document.getElementById('registrationForm');
        const submitBtn = document.getElementById('submitBtn');
        const submitText = document.getElementById('submitText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const successModal = document.getElementById('successModal');
        const continueBtn = document.getElementById('continueBtn');

        // Real-time validation
        const validateField = (field, errorElement, validationFn) => {
            field.addEventListener('blur', () => {
                const error = validationFn(field.value);
                if (error) {
                    errorElement.textContent = error;
                    errorElement.classList.remove('hidden');
                    field.classList.add('border-error');
                } else {
                    errorElement.classList.add('hidden');
                    field.classList.remove('border-error');
                }
            });
        };

        // Validation functions
        const validateFullName = (value) => {
            if (!value.trim()) return 'Full name is required';
            if (value.trim().length < 2) return 'Full name must be at least 2 characters';
            return null;
        };

        const validateEmail = (value) => {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!value) return 'Email is required';
            if (!emailRegex.test(value)) return 'Please enter a valid email address';
            return null;
        };

        const validatePhone = (value) => {
            const phoneRegex = /^[0-9]{9}$/;
            if (!value) return 'Phone number is required';
            if (!phoneRegex.test(value)) return 'Please enter a valid 9-digit phone number';
            return null;
        };

        const validatePassword = (value) => {
            if (!value) return 'Password is required';
            if (value.length < 8) return 'Password must be at least 8 characters long';
            return null;
        };

        const validateConfirmPassword = (value, password) => {
            if (!value) return 'Please confirm your password';
            if (value !== password) return 'Passwords do not match';
            return null;
        };

        // Apply validation
        validateField(document.getElementById('fullName'), document.getElementById('fullNameError'), validateFullName);
        validateField(document.getElementById('email'), document.getElementById('emailError'), validateEmail);
        validateField(document.getElementById('phone'), document.getElementById('phoneError'), validatePhone);
        validateField(document.getElementById('password'), document.getElementById('passwordError'), validatePassword);
        
        document.getElementById('confirmPassword').addEventListener('blur', () => {
            const confirmPassword = document.getElementById('confirmPassword').value;
            const password = document.getElementById('password').value;
            const errorElement = document.getElementById('confirmPasswordError');
            const error = validateConfirmPassword(confirmPassword, password);
            
            if (error) {
                errorElement.textContent = error;
                errorElement.classList.remove('hidden');
                document.getElementById('confirmPassword').classList.add('border-error');
            } else {
                errorElement.classList.add('hidden');
                document.getElementById('confirmPassword').classList.remove('border-error');
            }
        });

        // Form submission
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Show loading state
            submitText.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');
            submitBtn.disabled = true;
            
            // Simulate registration process
            setTimeout(() => {
                // Hide loading state
                submitText.classList.remove('hidden');
                loadingSpinner.classList.add('hidden');
                submitBtn.disabled = false;
                
                // Show success modal
                successModal.classList.remove('hidden');
            }, 2000);
        });

        // Continue button
        continueBtn.addEventListener('click', () => {
            const userType = document.querySelector('input[name="userType"]:checked').value;
            if (userType === 'owner') {
                window.location.href = 'user_dashboard.html';
            } else {
                window.location.href = 'property_search_and_browse.html';
            }
        });

        // Close modal on outside click
        successModal.addEventListener('click', (e) => {
            if (e.target === successModal) {
                successModal.classList.add('hidden');
            }
        });
    </script>
<script id="dhws-dataInjector" src="../public/dhws-data-injector.js"></script>
</body>
</html>
