<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Betoch - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/auth.js"></script>
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            /* Skyscraper/City */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            /* Darker overlay for content pop */
            backdrop-filter: blur(5px);
            z-index: -1;
        }

        .glass-nav {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(167, 139, 250, 0.5);
        }

        .hero-glow {
            background: radial-gradient(circle at center, rgba(124, 58, 237, 0.3) 0%, transparent 70%);
        }
    </style>
</head>

<body class="font-sans text-white relative">
    <div class="bg-overlay"></div>
    <!-- Navigation -->
    <nav class="glass-nav fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center">
                    <a href="home.html"
                        class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 hover:scale-105 transition-transform duration-300">🏠
                        Betoch</a>
                </div>

                <!-- Desktop Nav -->
                <div class="hidden md:flex items-center space-x-6">
                    <a href="#"
                        class="text-gray-300 hover:text-cyan-400 transition-colors duration-300 text-sm font-medium tracking-wide">Buy</a>
                    <a href="#"
                        class="text-gray-300 hover:text-cyan-400 transition-colors duration-300 text-sm font-medium tracking-wide">Rent</a>
                    <div id="auth-nav-container" class="flex items-center">
                        <a href="login.html"
                            class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Login</a>
                        <a href="signup.html"
                            class="bg-indigo-600 text-white px-4 py-2 rounded-full text-sm font-medium hover:bg-indigo-500 transition duration-300 shadow-lg shadow-indigo-500/30 ml-2">Sign
                            Up</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="relative pt-20 pb-16 overflow-hidden min-h-screen flex items-center">
        <!-- Background decorative elements -->
        <div class="absolute top-0 left-1/2 w-full h-full transform -translate-x-1/2 hero-glow pointer-events-none">
        </div>
        <div
            class="absolute top-20 right-10 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob">
        </div>
        <div
            class="absolute bottom-10 left-10 w-72 h-72 bg-cyan-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000">
        </div>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 w-full">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                <div class="text-center lg:text-left">
                    <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-8">
                        <span class="block text-white mb-2">Find your</span>
                        <span
                            class="block text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-purple-400 to-pink-400 neon-text">Future
                            Home</span>
                    </h1>
                    <p class="mt-4 text-xl text-indigo-200 max-w-lg mx-auto lg:mx-0 leading-relaxed">
                        Experience Ethiopian real estate like never before.
                        Immersive AI-powered 3D tours, instant Telebirr payments, and a seamless digital rental
                        experience.
                    </p>
                    <div class="mt-10 flex flex-col sm:flex-row gap-4 justify-center lg:justify-start">
                        <a href="list_property.html"
                            class="px-8 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-full font-bold shadow-lg shadow-indigo-600/40 hover:shadow-indigo-600/60 transform hover:-translate-y-1 transition-all duration-300 flex items-center justify-center">
                            List Property
                            <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                            </svg>
                        </a>
                        <a href="#"
                            class="px-8 py-4 bg-white/10 backdrop-blur-md border border-white/20 text-white rounded-full font-bold hover:bg-white/20 transition-all duration-300 flex items-center justify-center">
                            Browse Homes
                        </a>
                    </div>
                </div>
                <div class="relative hidden lg:block">
                    <div
                        class="relative rounded-2xl overflow-hidden shadow-2xl shadow-purple-900/50 border border-white/10 transition-transform hover:scale-[1.02] duration-500">
                        <img class="w-full object-cover"
                            src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80"
                            alt="Modern home">
                        <div
                            class="absolute inset-0 bg-gradient-to-t from-gray-900 via-transparent to-transparent opacity-80">
                        </div>
                        <div class="absolute bottom-6 left-6">
                            <div class="bg-black/50 backdrop-blur-md px-4 py-2 rounded-lg border border-white/20">
                                <span class="text-cyan-400 font-bold">New Listing</span>
                                <p class="text-sm text-gray-300">Futuristic Villa, Addis Ababa</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Auth UI
        document.addEventListener('DOMContentLoaded', () => {
            Auth.initUI();
        });
    </script>
</body>

</html>
